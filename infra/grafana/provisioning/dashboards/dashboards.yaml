# Dashboard provider — Grafana scans /var/lib/grafana/dashboards for *.json
# and loads them as managed dashboards.
#
# Source-of-truth: the JSON files in infra/grafana/dashboards/. UI edits
# survive between scans (allowUiUpdates: true) but are CLOBBERED whenever
# the file changes. To make a UI change permanent: export the dashboard
# JSON from Grafana and commit it back to the file.
apiVersion: 1

providers:
  - name: csat-dashboards
    orgId: 1
    type: file
    folder: CSAT
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      # Mounted from infra/grafana/dashboards/ at container start. Lives
      # OUTSIDE /var/lib/grafana on purpose — the named `grafana-data`
      # volume owns that path, so bind-mounting a sub-path inside it can
      # silently fail. Keep this path in sync with the bind mount target
      # in infra/observability/docker-compose.yml.
      path: /etc/grafana/dashboards
      foldersFromFilesStructure: false
